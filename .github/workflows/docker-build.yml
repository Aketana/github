name: Docker Build

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t demo-app .

      - name : Run Docker Container
        run: docker run -d --name demo demo-app

      - name: Wait
        run: sleep 5

      - name: Test API
        run: curl http://localhost:5000/health

      - name: Stop Container
        run: docker stop demo