name: Docker Build

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: githublab

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          until pg_isready -h localhost -U admin
          do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
        env:
          PGPASSWORD: password

      - name: Initialize Database
        run: |
          psql -h localhost -U admin -d githublab -f database/init.sql
        env:
          PGPASSWORD: password

      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_NAME: githublab
          DB_USER: admin
          DB_PASSWORD: password
        run: python -m pytest -v

      - name: Build Docker Image
        run: docker build -t demo-app .

      - name: Run Docker Container
        run: docker run -d --name demo -p 5000:5000 demo-app

      - name: Show Container Status
        run: docker ps -a

      - name: Show Container Logs
        run: docker logs demo


      - name: Inspect Container
        run: |
            docker exec demo ls -la
            docker exec demo pwd
            docker exec demo ps -ef

      - name: Wait
        run: sleep 5


      - name: Health Check
        run: |
          curl -v http://localhost:5000/health

      - name: Stop Container
        run: docker stop demo

      - name: Cleanup
        if: always()
        run: docker rm -f demo
