name: Docker Push

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/aketanar/demo-app:latest .

      - name: Debug
        run: |
         echo "OWNER=${{ github.repository_owner }}"
         echo "REPO=${{ github.repository }}"

      - name: Push Image
        run: |
          docker push ghcr.io/aketanar/demo-app:latest