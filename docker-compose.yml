services:
  app:
    image: ghcr.io/aketana/lastest
    container_name: github-demo
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_NAME: githublab
      DB_USER: admin
      DB_PASSWORD: password

  db:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: githublab

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  postgres-data:
